services:
  postgres:
    image: postgres:16-alpine
    container_name: top-clients-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: top_clients
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d top_clients"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
